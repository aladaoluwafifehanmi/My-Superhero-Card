<!DOCTYPE html>
<html>

<head>
    <title>My Superhero Card</title>
    <style>
        /* Typography — font, size, weight, colour for the whole page */
        body {
            background-color: rgb(164, 189, 38);
            color: rgb(105, 4, 4);
            font-family: Arial, sans-serif;
        }

        /* Typography + Text Shadow — big bold title with an orange shadow */
        .hero-name {
            font-size: 70px;
            font-weight: bold;
            color: yellow;
            text-shadow: 4px 4px rgba(183, 124, 6, 0.884);
        }

        /* Typography + Text Transform — tagline becomes Title Case */
        .tagline {
            font-style: italic;
            color: rgb(0, 1, 2);
            text-transform: capitalize;
        }

        /* Text Transform + Text Decoration — section headings in CAPS with underline */
        .label {
            text-transform: uppercase;
            text-decoration: underline;
            color: coral;
        }

        /* Typography — powers stand out in bold green */
        .power {
            font-weight: bold;
            color: lightgreen;
        }

        /* Text Decoration — weaknesses are crossed out */
        .weakness {
            text-decoration: line-through;
            color: gray;
        }

        /* Transform — the badge is tilted to the side */
        .badge {
            font-size: 28px;
            font-weight: bold;
            color: rgb(255, 217, 2);
            transform: rotate(15deg);
        }

        /* Typography — footer text */
        .made-by {
            color: rgb(133, 231, 13);
            font-style: italic;
        }
    </style>
</head>
